<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>护药通 NurseDrugSafe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif}
:root{--primary:#1a73e8;--primary-light:#e8f0fe;--primary-dark:#1557b0;--danger:#d93025;--danger-light:#fce8e6;--warning:#ea6600;--warning-light:#fff3e0;--safe:#0d904f;--safe-light:#e6f4ea;--bg:#f0f4f8;--card:#fff;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:12px;--tab-height:64px}
body{background:var(--bg);color:#202124;min-height:100vh;padding-bottom:var(--tab-height)}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:16px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}
.stats{display:flex;gap:16px;font-size:13px;margin-top:8px;opacity:0.9;flex-wrap:wrap}
.stats-link{cursor:pointer;text-decoration:underline;color:#aecbff;background:none;border:none;font-size:13px;font-family:inherit}
.tab-bar{display:flex;position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e0e0e0;z-index:100;height:var(--tab-height);box-shadow:0 -2px 8px rgba(0,0,0,0.06)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 0;border:none;background:transparent;color:#5f6368;font-size:11px;cursor:pointer}
.tab-btn.active{color:var(--primary)}
.tab-btn svg{width:24px;height:24px;fill:currentColor}
.tab-panel{display:none;padding:16px}.tab-panel.active{display:block}
.search-box{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-box input{flex:1;min-width:160px;padding:10px 16px;border:2px solid #e0e0e0;border-radius:24px;font-size:15px;outline:none}
.search-box select{padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;background:white}
.mic-btn{width:44px;height:44px;border-radius:50%;border:2px solid #e0e0e0;background:white;cursor:pointer;font-size:20px}
.drug-card{background:white;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--primary)}
.drug-card-name{font-size:17px;font-weight:600}
.drug-cat-tag{font-size:11px;padding:2px 8px;background:var(--primary-light);color:var(--primary);border-radius:12px}
.tag-adv{font-size:11px;padding:2px 8px;background:var(--warning-light);color:var(--warning);border-radius:12px}
.tag-sev{font-size:11px;padding:2px 8px;background:var(--danger-light);color:var(--danger);border-radius:12px;font-weight:600}
.drug-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #eee}.drug-detail.open{display:block}
.warn-card{padding:14px;border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid}
.warn-card.severe{border-color:var(--danger);background:var(--danger-light)}
.warn-card.normal{border-color:var(--warning);background:var(--warning-light)}
.warn-card.safe{border-color:var(--safe);background:var(--safe-light)}
.quiz-option{padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:14px}
.quiz-option.correct{background:var(--safe-light);border-color:var(--safe);color:var(--safe)}
.quiz-option.wrong{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}.modal-content{background:white;border-radius:var(--radius);padding:24px;max-width:95vw;max-height:85vh;overflow:auto}
.modal-title{font-size:18px;font-weight:600}.modal-close{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#5f6368}
.compare-table{width:100%;border-collapse:collapse;font-size:13px}
.compare-table td,.compare-table th{border:1px solid #e0e0e0;padding:8px 10px;vertical-align:top}
.compare-table th{background:var(--primary-light);color:var(--primary);font-weight:600}
.card-preview{background:white;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);max-width:800px;margin:0 auto}
.card-header{text-align:center;border-bottom:3px solid var(--primary);padding-bottom:12px;margin-bottom:16px}
.card-title{font-size:22px;font-weight:700;color:var(--primary)}
.card-warn-box{background:var(--danger-light);border:1px solid var(--danger);border-radius:8px;padding:12px;margin-bottom:16px}
.print-btn{display:block;margin:16px auto;padding:10px 24px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px}
@media print{body{background:white;padding:0}.header,.tab-bar,.search-box,.print-btn{display:none!important}.tab-panel{display:block!important;padding:0!important}.card-preview{box-shadow:none;padding:16px;max-width:100%}}
</style>
</head>

function esc(s){
    if(!s)return"";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function switchTab(n){
    document.querySelectorAll(".tab-panel").forEach(function(p){p.classList.remove("active")});
    document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active")});
    document.getElementById("tab-"+n).classList.add("active");
    document.querySelector('.tab-btn[data-tab="'+n+'"]').classList.add("active");
}

function openRulesModal(){
    var b=document.getElementById("rulesTableBody");
    var h='<table class="compare-table"><tr><th>ID</th><th>\u836f\u7269A</th><th>\u836f\u7269B</th><th>\u76f8\u4e92\u4f5c\u7528\u63cf\u8ff0</th><th>\u7ea7\u522b</th></tr>';
    INTERACTIONS.forEach(function(x){
        var c=x.level==="\u4e25\u91cd"?"var(--danger)":"var(--warning)";
        h+='<tr style="background:'+(x.level==="\u4e25\u91cd"?"#fce8e6":"#fff3e0")+'"><td style="text-align:center">'+x.id+'</td><td>'+esc(x.drugA)+'</td><td>'+esc(x.drugB)+'</td><td style="font-size:12px">'+esc(x.description)+'</td><td style="text-align:center;font-weight:600;color:'+c+'">'+x.level+'</td></tr>';
    });
    h+="</table>";
    b.innerHTML=h;
    document.getElementById("rulesModal").classList.add("open");
}

function closeRulesModal(e){
    if(e&&e.target!==e.currentTarget)return;
    document.getElementById("rulesModal").classList.remove("open");
}

function filterDrugs(){
    try {
        var q=document.getElementById("searchInput").value.trim().toLowerCase();
        var cat=document.getElementById("catFilter").value;
        var lst=document.getElementById("drugList");
        var emp=document.getElementById("emptyState");
        if(!lst) return;
        var h="";var cnt=0;
        for(var di=0;di<DRUGS.length;di++){
            var d=DRUGS[di];
            var nm=d.genericName.toLowerCase().indexOf(q)!==-1||d.pinyin.toLowerCase().indexOf(q)!==-1||(d.brandName&&d.brandName.toLowerCase().indexOf(q)!==-1);
            var cm=!cat||d.category===cat;
            if(nm&&cm){
                cnt++;
                h+='<div class="drug-card" onclick="toggleDetail('+d.id+')">';
                h+='<div class="drug-card-name">'+esc(d.genericName)+'</div>';
                if(d.brandName) h+='<small>'+esc(d.brandName)+'</small> ';
                h+='<span class="drug-cat-tag">'+esc(d.category)+'</span>';
                for(var ai=0;ai<d.severeAdverse.length;ai++){h+='<span class="tag-sev">'+esc(d.severeAdverse[ai])+'</span>'}
                for(var ai=0;ai<d.mainAdverse.slice(0,3).length;ai++){h+='<span class="tag-adv">'+esc(d.mainAdverse.slice(0,3)[ai])+'</span>'}
                h+='<div class="drug-detail" id="detail-'+d.id+'">';
                h+='<div><b>\U0001f4cb \u7528\u836f\u524d\u62a4\u7406</b><br>'+esc(d.nursingPreUse)+'</div>';
                h+='<div><b>\U0001f48a \u7528\u836f\u4e2d\u62a4\u7406</b><br>'+esc(d.nursingDuringUse)+'</div>';
                h+='<div><b>\U0001f3c1 \u7528\u836f\u540e\u62a4\u7406</b><br>'+esc(d.nursingPostUse)+'</div>';
                h+='<div><b>\U0001f6ab \u7981\u5fcc\u4eba\u7fa4</b><br>';
                for(var ci=0;ci<d.contraindications.length;ci++){h+=esc(d.contraindications[ci])+"; "}
                h+='</div>';
                h+='<label><input type="checkbox" onchange="toggleCompare('+d.id+',this)"> \u6dfb\u52a0\u5bf9\u6bd4</label>';
                h+='</div></div>';
            }
        }
        lst.innerHTML=h;
        if(emp) emp.style.display=cnt===0?"block":"none";
    } catch(e){console.error("filterDrugs error:",e)}
}

function toggleDetail(id){
    var e=document.getElementById("detail-"+id);
    if(e)e.classList.toggle("open");
}

function toggleCompare(id,el){
    if(el.checked){
        if(compareSet.size>=3){alert("\u6700\u591a\u5bf9\u6bd43\u79cd\u836f\u7269");el.checked=false;return}
        compareSet.add(id);
    } else compareSet.delete(id);
    document.getElementById("compareCount").textContent="\u5df2\u9009 "+compareSet.size+" \u79cd\u836f\u7269";
    document.getElementById("compareBar").style.display=compareSet.size>=2?"flex":"none";
    document.getElementById("compareBtn").disabled=compareSet.size<2;
}

function showCompare(){
    var ids=[...compareSet];
    var items=[];
    for(var i=0;i<ids.length;i++){items.push(DRUGS.find(function(d){return d.id===ids[i]}))}
    var h='<table class="compare-table"><tr><th>\u9879\u76ee</th>';
    for(var i=0;i<items.length;i++){h+='<th>'+esc(items[i].genericName)+'</th>'}
    h+='</tr>';
    var fields=[["\u5546\u54c1\u540d","brandName"],["\u4e3b\u8981\u4e0d\u826f\u53cd\u5e94",function(d){return d.mainAdverse.join("\uff1b")}],["\u4e25\u91cd\u4e0d\u826f\u53cd\u5e94",function(d){return d.severeAdverse.join("\uff1b")||"\u65e0"}],["\u7981\u5fcc\u75c7",function(d){return d.contraindications.join("\uff1b")||"\u65e0"}],["\u7528\u836f\u524d\u62a4\u7406","nursingPreUse"],["\u7528\u836f\u4e2d\u62a4\u7406","nursingDuringUse"],["\u7528\u836f\u540e\u62a4\u7406","nursingPostUse"]];
    for(var fi=0;fi<fields.length;fi++){
        h+='<tr><td style="font-weight:600">'+fields[fi][0]+'</td>';
        for(var ii=0;ii<items.length;ii++){
            var v=typeof fields[fi][1]==="function"?fields[fi][1](items[ii]):items[ii][fields[fi][1]];
            h+='<td>'+esc(String(v))+'</td>';
        }
        h+='</tr>';
    }
    h+='</table>';
    document.getElementById("compareBody").innerHTML=h;
    document.getElementById("compareModal").classList.add("open");
}

function closeCompare(){document.getElementById("compareModal").classList.remove("open")}

function startVoice(){
    if(typeof window.SpeechRecognition==="undefined"&&typeof window.webkitSpeechRecognition==="undefined"){
        alert("\u60a8\u7684\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u8bed\u97f3\u8f93\u5165");return;
    }
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    var r=new SR();
    r.lang="zh-CN";
    r.interimResults=false;
    var btn=document.getElementById("micBtn");
    btn.classList.add("recording");
    btn.textContent="\U0001f534";
    r.onresult=function(e){
        document.getElementById("searchInput").value=e.results[0][0].transcript;
        filterDrugs();
        btn.classList.remove("recording");btn.textContent="\U0001f3a4";
    };
    r.onerror=function(){btn.classList.remove("recording");btn.textContent="\U0001f3a4";};
    r.onend=function(){btn.classList.remove("recording");btn.textContent="\U0001f3a4";};
    r.start();
}

function loadCase(){
    var t=document.getElementById("caseSelect").value;
    if(!t)return;
    var c=CASES.find(function(x){return x.title===t});
    if(c){
        for(var di=0;di<c.drugs.length;di++){
            var n=c.drugs[di];
            var f=DRUGS.find(function(d){return d.genericName===n});
            if(f&&warnDrugs.indexOf(f.genericName)===-1)warnDrugs.push(f.genericName);
        }
    }
    renderWarnList();
}

function addWarnDrug(){
    var inp=document.getElementById("warnDrugInput");
    var name=inp.value.trim();
    if(!name)return;
    var f=DRUGS.find(function(d){return d.genericName===name||d.pinyin===name});
    if(f){
        if(warnDrugs.indexOf(f.genericName)===-1)warnDrugs.push(f.genericName);
    } else {
        if(warnDrugs.indexOf(name)===-1)warnDrugs.push(name);
    }
    inp.value="";
    renderWarnList();
}

function clearWarnList(){
    warnDrugs=[];
    renderWarnList();
    document.getElementById("warnResults").innerHTML="";
    document.getElementById("reportBox").style.display="none";
}

function renderWarnList(){
    var lst=document.getElementById("warnDrugList");
    if(!lst)return;
    lst.innerHTML="";
    for(var i=0;i<warnDrugs.length;i++){
        var sp=document.createElement("span");
        sp.style.cssText="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--primary-light);border-radius:16px;font-size:13px;margin:4px";
        sp.textContent=warnDrugs[i];
        var rm=document.createElement("span");
        rm.textContent="\u00d7";
        rm.style.cssText="cursor:pointer;color:var(--danger);font-weight:700;font-size:16px;margin-left:4px";
        rm.onclick=function(){var idx=warnDrugs.indexOf(this.parentNode.textContent.slice(0,-1));if(idx>-1)warnDrugs.splice(idx,1);renderWarnList();};
        sp.appendChild(rm);
        lst.appendChild(sp);
    }
}

function analyzeInteractions(){
    var r=document.getElementById("warnResults");
    var rp=document.getElementById("reportBox");
    if(warnDrugs.length<2){
        r.innerHTML='<div class="warn-card safe"><div class="warn-title">\u26a0\ufe0f \u8bf7\u81f3\u5c11\u6dfb\u52a02\u79cd\u836f\u7269</div></div>';
        rp.style.display="none";return;
    }
    var found=[];
    for(var ri=0;ri<INTERACTIONS.length;ri++){
        var rule=INTERACTIONS[ri];
        var hasA=false,hasB=false;
        for(var wi=0;wi<warnDrugs.length;wi++){
            var d=warnDrugs[wi];
            if(d.indexOf(rule.drugA)!==-1||rule.drugA.indexOf(d)!==-1)hasA=true;
            if(d.indexOf(rule.drugB)!==-1||rule.drugB.indexOf(d)!==-1)hasB=true;
            var dg=DRUGS.find(function(dd){return dd.genericName===d});
            if(dg){
                if(dg.category.indexOf(rule.drugA)!==-1||rule.drugA.indexOf(dg.category)!==-1)hasA=true;
                if(dg.category.indexOf(rule.drugB)!==-1||rule.drugB.indexOf(dg.category)!==-1)hasB=true;
            }
        }
        if(hasA&&hasB)found.push(rule);
    }
    if(found.length===0){
        r.innerHTML='<div class="warn-card safe"><div class="warn-title">\u2705 \u672a\u68c0\u6d4b\u5230\u5df2\u77e5\u914d\u6094\u7981\u5fcc</div><div class="warn-desc">\u8bf7\u4ecd\u4fdd\u6301\u89c2\u5bdf\u3002</div></div>';
        rp.style.display="none";return;
    }
    var h="";
    for(var fi=0;fi<found.length;fi++){
        var rr=found[fi];
        var cls=rr.level==="\u4e25\u91cd"?"severe":"normal";
        h+='<div class="warn-card '+cls+'"><div class="warn-title">\u26a1 '+esc(rr.drugA)+' + '+esc(rr.drugB)+'</div><div class="warn-desc">'+esc(rr.description)+'</div><span style="background:'+(rr.level==="\u4e25\u91cd"?"var(--danger)":"var(--warning)")+';color:white;padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600">'+rr.level+'</span></div>';
    }
    r.innerHTML=h;
    var sev=found.filter(function(x){return x.level==="\u4e25\u91cd"}).length;
    var nor=found.length-sev;
    var rt="\u3010\u7528\u836f\u5b89\u5168\u5206\u6790\u62a5\u544a\u3011\n\u7528\u836f\u6e05\u5355\uff1a"+warnDrugs.join("\u3001")+"\n\u5171\u53d1\u73b0 "+found.length+"\u6761\u836f\u7269\u76f8\u4e92\u4f5c\u7528\uff0c\u5176\u4e2d\u4e25\u91cd "+sev+"\u6761\uff0c\u4e00\u822c "+nor+"\u6761\u3002\n\n";
    for(var fi=0;fi<found.length;fi++){rt+="\u2022 "+found[fi].drugA+" + "+found[fi].drugB+"\uff1a"+found[fi].description+"\uff08"+found[fi].level+"\uff09\n"}
    rt+="\n\u5efa\u8bae\uff1a\u4e25\u5bc6\u76d1\u6d4b\u60a3\u8005\u7684\u4e34\u5e8a\u75c7\u72b6\u548c\u751f\u547d\u4f53\u5f81\u53d8\u5316\u3002";
    document.getElementById("reportText").textContent=rt;
    rp.style.display="block";
}

function copyReport(){
    navigator.clipboard.writeText(document.getElementById("reportText").textContent);
    alert("\u62a5\u544a\u5df2\u590d\u5236");
}

function startQuiz(){loadQ()}

function loadQ(){
    var idx=Math.floor(Math.random()*DRUGS.length);
    var drug=DRUGS[idx];
    var isS=Math.random()>0.5;
    var q=esc(drug.genericName)+(isS?" \u7684\u4e25\u91cd\u4e0d\u826f\u53cd\u5e94\u662f\u4ec0\u4e48\uff1f":" \u6700\u91cd\u8981\u7684\u62a4\u7406\u89c2\u5bdf\u8981\u70b9\u662f\u4ec0\u4e48\uff1f");
    var ca=isS?(drug.severeAdverse.length>0?drug.severeAdverse[0]:"\u65e0\u660e\u786e\u4e25\u91cd\u4e0d\u826f\u53cd\u5e94"):drug.nursingDuringUse.split("\uff1b")[0];
    var answers=[ca];
    while(answers.length<4){
        var ri=Math.floor(Math.random()*DRUGS.length);
        var od=DRUGS[ri];
        if(od.id===drug.id)continue;
        var ans=isS?(od.severeAdverse.length>0?od.severeAdverse[0]:""):od.nursingDuringUse.split("\uff1b")[0];
        if(ans&&answers.indexOf(ans)===-1)answers.push(ans);
    }
    for(var i=answers.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=answers[i];answers[i]=answers[j];answers[j]=t;}
    var h='<div class="quiz-question"><div style="font-size:16px;font-weight:600;margin-bottom:16px">'+q+'</div>';
    for(var i=0;i<answers.length;i++){h+='<div class="quiz-option" id="qopt-'+i+'" onclick="selectA('+i+')">'+esc(answers[i])+'</div>'}
    h+="</div>";
    document.getElementById("quizContent").innerHTML=h;
    document.getElementById("quizContent").dataset.correct=ca;
    document.getElementById("quizContent").dataset.drugName=drug.genericName;
}

function selectA(idx){
    var ca=document.getElementById("quizContent").dataset.correct;
    var drugName=document.getElementById("quizContent").dataset.drugName;
    var opts=document.querySelectorAll(".quiz-option");
    for(var i=0;i<opts.length;i++){
        if(opts[i].textContent===ca){opts[i].classList.add("correct")}
        else if(i===idx){opts[i].classList.add("wrong")}
    }
    var isCorrect=opts[idx].textContent===ca;
    qs.total++;if(isCorrect)qs.corr++;
    if(!isCorrect&&!qs.wrong.some(function(w){return w.name===drugName})){
        qs.wrong.push({name:drugName,answer:ca});
        localStorage.setItem("wrongBook",JSON.stringify(qs.wrong));
    }
    document.getElementById("quizStats").textContent="\u6b63\u786e\u7387: "+Math.round(qs.corr/(qs.total||1)*100)+"% ("+qs.corr+"/"+qs.total+")";
    updWB();
    var nb="<div style=\"margin-top:16px;text-align:center\"><button onclick=\"loadQ()\" style=\"padding:10px 24px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px\">\u4e0b\u4e00\u9898</button></div>";
    document.getElementById("quizContent").innerHTML+=nb;
}

function updWB(){
    var lst=document.getElementById("wrongList");
    document.getElementById("wrongCount").textContent=qs.wrong.length;
    if(qs.wrong.length===0){lst.innerHTML="<div style=\"color:#999;font-size:14px;padding:8px\">\u6682\u65e0\u9519\u9898</div>";return}
    lst.innerHTML="";
    for(var i=0;i<qs.wrong.length;i++){
        var div=document.createElement("div");
        div.style.cssText="padding:10px;border-bottom:1px solid #eee;font-size:14px";
        div.innerHTML="<strong>"+(i+1)+". "+esc(qs.wrong[i].name)+"</strong> - \u7b54\u6848\uff1a"+esc(qs.wrong[i].answer);
        lst.appendChild(div);
    }
}

function clearWrongBook(){qs.wrong=[];localStorage.setItem("wrongBook","[]");updWB()}

function filterCardDrugs(){
    var q=document.getElementById("cardSearchInput").value.trim().toLowerCase();
    var sel=document.getElementById("cardSelect");
    var h='<select style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px" onchange="showCard(this.value)"><option value="">\u9009\u62e9\u836f\u7269...</option>';
    for(var di=0;di<DRUGS.length;di++){
        var d=DRUGS[di];
        if(d.genericName.toLowerCase().indexOf(q)!==-1||d.pinyin.toLowerCase().indexOf(q)!==-1){
            h+='<option value="'+d.id+'">'+esc(d.genericName)+'</option>';
        }
    }
    h+="</select>";
    sel.innerHTML=h;
}

function showCard(id){
    if(!id){document.getElementById("cardPreview").innerHTML="";return}
    var d=DRUGS.find(function(x){return x.id==id});
    if(!d)return;
    var h='<div class="card-preview" id="printArea">';
    h+='<div class="card-header"><div class="card-title">'+esc(d.genericName)+'</div><div style="font-size:13px;color:#5f6368">'+esc(d.brandName||"")+" | "+esc(d.category)+'</div></div>';
    h+='<div class="card-section"><b>\u7528\u836f\u524d\u62a4\u7406\u8981\u70b9</b><br>';
    var preItems=d.nursingPreUse.split("\uff1b");
    for(var i=0;i<preItems.length;i++){if(preItems[i].trim())h+=esc(preItems[i].trim())+"<br>"}
    h+="</div>";
    h+='<div class="card-section"><b>\u7528\u836f\u4e2d\u62a4\u7406\u8981\u70b9</b><br>';
    var duringItems=d.nursingDuringUse.split("\uff1b");
    for(var i=0;i<duringItems.length;i++){if(duringItems[i].trim())h+=esc(duringItems[i].trim())+"<br>"}
    h+="</div>";
    h+='<div class="card-section"><b>\u7528\u836f\u540e\u62a4\u7406\u8981\u70b9</b><br>';
    var postItems=d.nursingPostUse.split("\uff1b");
    for(var i=0;i<postItems.length;i++){if(postItems[i].trim())h+=esc(postItems[i].trim())+"<br>"}
    h+="</div>";
    if(d.severeAdverse.length>0){
        h+='<div class="card-warn-box"><div style="font-weight:600;color:var(--danger)">\u26a0\ufe0f \u4e25\u91cd\u4e0d\u826f\u53cd\u5e94\u8b66\u793a</div>';
        for(var i=0;i<d.severeAdverse.length;i++){h+="\u2022 "+esc(d.severeAdverse[i])+"<br>"}
        h+="</div>";
    }
    h+='<div class="card-section"><b>\u7981\u5fcc\u4eba\u7fa4</b><br>';
    for(var i=0;i<d.contraindications.length;i++){h+=esc(d.contraindications[i])+"; "}
    h+="</div>";
    h+='<div style="width:100px;height:100px;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;margin:16px auto;border-radius:8px;color:#999">\u4e8c\u7ef4\u7801\u5360\u4f4d</div>';
    h+='</div><button class="print-btn" onclick="printCard()">\U0001f5a8\ufe0f \u6253\u5370\u6b64\u5361\u7247</button>';
    document.getElementById("cardPreview").innerHTML=h;
}

function printCard(){
    var c=document.getElementById("printArea").innerHTML;
    var w=window.open("","","width=800,height=600");
    w.document.write("<!DOCTYPE html><html><head><meta charset=\\\"UTF-8\\\"><title>\u62a4\u836f\u901a-\u77e5\u8bc6\u5361\u7247</title>");
    w.document.write("<style>*{margin:0;padding:0;font-family:Microsoft YaHei,sans-serif;box-sizing:border-box}.card-preview{max-width:800px;margin:0 auto;padding:24px}.card-header{text-align:center;border-bottom:3px solid #1a73e8;padding-bottom:12px}.card-title{font-size:22px;font-weight:700;color:#1a73e8}.card-section{margin-bottom:16px}.card-section b{font-size:14px;color:#5f6368;border-bottom:1px solid #eee;display:block;padding-bottom:4px;margin-bottom:8px}.card-warn-box{background:#fce8e6;border:1px solid #d93025;border-radius:8px;padding:12px;margin-bottom:16px}</style></head><body>"+c+"</body></html>");
    w.document.close();
    setTimeout(function(){w.print()},500);
}

document.addEventListener("DOMContentLoaded",function(){
    try{
        filterDrugs();
        updWB();
        filterCardDrugs();
        var dl=document.getElementById("drugSuggestions");
        if(dl){
            var opts="";
            for(var di=0;di<DRUGS.length;di++){opts+='<option value="'+esc(DRUGS[di].genericName)+'">'}
            dl.innerHTML=opts;
        }
    }catch(e){console.error("\u62a4\u836f\u901a\u52a0\u8f7d\u9519\u8bef:",e)}
    console.log("\u62a4\u836f\u901a\u77e5\u8bc6\u5e93\u52a0\u8f7d\u6210\u529f\uff0c\u836f\u7269\u6570\u91cf\uff1a"+DRUGS.length+"\uff0c\u89c4\u5219\u6570\u91cf\uff1a"+INTERACTIONS.length+"\uff0c\u75c5\u4f8b\u6570\u91cf\uff1a"+CASES.length);
});
</script></body></html>
